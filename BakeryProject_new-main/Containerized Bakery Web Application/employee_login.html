<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login & Register - Pune Bakery</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"> 
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-white navbar-light sticky-top px-4 px-lg-5 py-lg-0">
        <a href="index.html" class="navbar-brand d-flex align-items-center">
            <h1 class="m-0 text-primary">Pune Bakery</h1>
        </a>
    </nav>

    <div class="container-xxl py-6">
        <div class="container">
            <div class="row g-5 justify-content-center">
                <div class="col-lg-5">
                    <div class="bg-light rounded p-5 shadow">
                        <ul class="nav nav-pills mb-4 justify-content-center" id="authTabs">
                            <li class="nav-item">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#loginForm">Login</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#registerForm">Register</button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <!-- Login Form -->
                            <div class="tab-pane fade show active" id="loginForm">
                                <form id="loginSubmit">
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" id="loginEmail" placeholder="Email" required>
                                        <label>Email Address</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                                        <label>Password</label>
                                    </div>
                                    <button class="btn btn-primary w-100 py-3" type="submit">Login</button>
                                </form>
                            </div>

                            <!-- Register Form -->
                            <div class="tab-pane fade" id="registerForm">
                                <form id="registerSubmit">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" id="regUsername" placeholder="Username" required>
                                        <label>Username</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="email" class="form-control" id="regEmail" placeholder="Email" required>
                                        <label>Email Address</label>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                                        <label>Password</label>
                                    </div>
                                    <button class="btn btn-primary w-100 py-3" type="submit">Register</button>
                                </form>
                            </div>
                        </div>
                        <div id="authMessage" class="mt-3 text-center"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        $(document).ready(function() {
            // Using relative path for API (proxied via Nginx)
            const apiBase = '';

            $('#loginSubmit').submit(function(e) {
                e.preventDefault();
                const data = {
                    email: $('#loginEmail').val(),
                    password: $('#loginPassword').val()
                };
                fetch(`${apiBase}/api/employee/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'ok') {
                        localStorage.setItem('user', JSON.stringify(res.user));
                        window.location.href = 'product.html';
                    } else {
                        $('#authMessage').html(`<span class="text-danger">${res.message}</span>`);
                    }
                })
                .catch(err => {
                    console.error('Login error:', err);
                    $('#authMessage').html(`<span class="text-danger">Error connecting to server. Please ensure port 8080 is open.</span>`);
                });
            });

            $('#registerSubmit').submit(function(e) {
                e.preventDefault();
                const data = {
                    username: $('#regUsername').val(),
                    email: $('#regEmail').val(),
                    password: $('#regPassword').val()
                };
                fetch(`${apiBase}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(res => res.json())
                .then(res => {
                    if (res.status === 'ok') {
                        alert('Registration successful! Please login.');
                        $('#login-tab').click();
                    } else {
                        $('#authMessage').html(`<span class="text-danger">${res.message}</span>`);
                    }
                })
                .catch(err => {
                    console.error('Registration error:', err);
                    $('#authMessage').html(`<span class="text-danger">Error connecting to server. Please ensure port 8080 is open.</span>`);
                });
            });
        });
    </script>
</body>
</html>
